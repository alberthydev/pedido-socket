<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PedidoSocket</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0e12;
      --surface: #16181f;
      --surface2: #1e2029;
      --border: #2a2d38;
      --accent: #f5c842;
      --accent2: #ff6b35;
      --green: #3ddc84;
      --red: #ff4d6d;
      --text: #e8e9ef;
      --muted: #6b7185;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
    }
    .logo span { color: var(--text); }

    .header-right { display: flex; gap: 20px; align-items: center; }

    #status-ws {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }
    #status-dot.conectado { background: var(--green); animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(61, 220, 132, 0.4); }
      50%       { box-shadow: 0 0 0 6px rgba(61, 220, 132, 0); }
    }

    #contador-clientes {
      font-size: 0.75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      flex: 1;
      min-height: 0;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      background: var(--surface);
    }

    .section-title {
      font-family: var(--font-head);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 0.72rem; color: var(--muted); }
    .form-group input, .form-group textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 10px 12px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--accent);
    }

    .btn-enviar {
      background: var(--accent);
      color: #0d0e12;
      border: none;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.9rem;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-enviar:hover { opacity: 0.88; }
    .btn-enviar:active { transform: scale(0.97); }

    #log-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      height: 140px;
      overflow-y: auto;
      font-size: 0.7rem;
      line-height: 1.7;
      color: var(--muted);
    }
    #log-box .log-entry { display: block; }
    #log-box .log-hora { color: var(--accent2); margin-right: 6px; }

    .painel {
      padding: 28px 32px;
      overflow-y: auto;
    }

    .painel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .painel-titulo {
      font-family: var(--font-head);
      font-size: 1.2rem;
      font-weight: 800;
    }
    #total-pedidos {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .colunas {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .coluna-status {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      min-height: 200px;
    }

    .coluna-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .coluna-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .coluna-count {
      background: var(--surface2);
      border: 1px solid var(--border);
      width: 22px; height: 22px;
      border-radius: 50%;
      font-size: 0.7rem;
      display: flex; align-items: center; justify-content: center;
    }

    .col-recebido   .coluna-label { color: #818cf8; }
    .col-preparo    .coluna-label { color: var(--accent); }
    .col-pronto     .coluna-label { color: var(--green); }
    .col-entregue   .coluna-label { color: var(--muted); }

    .col-recebido   { border-top: 3px solid #818cf8; }
    .col-preparo    { border-top: 3px solid var(--accent); }
    .col-pronto     { border-top: 3px solid var(--green); }
    .col-entregue   { border-top: 3px solid var(--border); }

    .pedido-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      animation: slideIn 0.25s ease;
      transition: border-color 0.2s;
    }
    .pedido-card:hover { border-color: var(--accent); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .pedido-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .pedido-id {
      font-size: 0.65rem;
      color: var(--accent2);
      font-weight: 500;
    }
    .pedido-hora {
      font-size: 0.65rem;
      color: var(--muted);
    }
    .pedido-cliente {
      font-weight: 500;
      font-size: 0.85rem;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pedido-itens {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .btn-avancar {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.68rem;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-avancar:hover {
      background: var(--surface);
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-avancar:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface2);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.8rem;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.25s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 1100px) {
      .main-grid { grid-template-columns: 1fr; }
      .colunas { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Pedido<span>Socket</span></div>
  <div class="header-right">
    <div id="status-ws">
      <div id="status-dot"></div>
      <span id="status-texto">Desconectado</span>
    </div>
    <div id="contador-clientes">👥 0 conectados</div>
  </div>
</header>

<div class="main-grid">

  <aside class="sidebar">
    <div>
      <div class="section-title">Novo Pedido</div>
      <div class="form-group" style="margin-bottom: 12px">
        <label>Nome do cliente</label>
        <input id="input-cliente" type="text" placeholder="Digite seu nome" />
      </div>
      <div class="form-group" style="margin-bottom: 16px">
        <label>Itens do pedido</label>
        <textarea id="input-itens" rows="3" placeholder="Ex: 1x X-Burguer"></textarea>
      </div>
      <button class="btn-enviar" onclick="enviarPedido()">Enviar Pedido →</button>
    </div>

    <div>
      <div class="section-title">Log de Conexões</div>
      <div id="log-box"></div>
    </div>
  </aside>

  <main class="painel">
    <div class="painel-header">
      <div class="painel-titulo">Painel de Pedidos</div>
      <div id="total-pedidos">0 pedidos</div>
    </div>

    <div class="colunas">
      <div class="coluna-status col-recebido" id="col-Recebido">
        <div class="coluna-header">
          <span class="coluna-label">Recebido</span>
          <span class="coluna-count" id="cnt-Recebido">0</span>
        </div>
      </div>
      <div class="coluna-status col-preparo" id="col-Em preparo">
        <div class="coluna-header">
          <span class="coluna-label">Em Preparo</span>
          <span class="coluna-count" id="cnt-Em preparo">0</span>
        </div>
      </div>
      <div class="coluna-status col-pronto" id="col-Pronto">
        <div class="coluna-header">
          <span class="coluna-label">Pronto</span>
          <span class="coluna-count" id="cnt-Pronto">0</span>
        </div>
      </div>
      <div class="coluna-status col-entregue" id="col-Entregue">
        <div class="coluna-header">
          <span class="coluna-label">Entregue</span>
          <span class="coluna-count" id="cnt-Entregue">0</span>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
  const STATUS = ["Recebido", "Em preparo", "Pronto", "Entregue"];
  let pedidos = {};
  let ws;


  function conectar() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}`);

    ws.onopen = () => {
      setStatus(true);
      addLog("Conexão WebSocket estabelecida");
    };

    ws.onclose = () => {
      setStatus(false);
      addLog("Conexão encerrada — tentando reconectar...");
      setTimeout(conectar, 3000);
    };

    ws.onerror = () => {
      addLog("Erro na conexão WebSocket");
    };

    ws.onmessage = (event) => {
      const { tipo, dados } = JSON.parse(event.data);

      if (tipo === "ESTADO_INICIAL") {
        dados.pedidos.forEach(renderPedido);
        dados.logs.forEach(e => addLog(`${e.msg}`, e.hora));
        atualizarContadores();
        return;
      }

      if (tipo === "PEDIDO_CRIADO") {
        renderPedido(dados);
        atualizarContadores();
        mostrarToast(`Novo pedido: ${dados.cliente}`);
        return;
      }

      if (tipo === "STATUS_ATUALIZADO") {
        const card = document.getElementById(`pedido-${dados.id}`);
        if (!card) return;
        const pedido = pedidos[dados.id];
        if (!pedido) return;
        const colAtual = document.getElementById(`col-${pedido.status}`);
        if (colAtual) colAtual.removeChild(card);
        pedido.status = dados.status;
        const colNova = document.getElementById(`col-${dados.status}`);
        if (colNova) colNova.appendChild(card);
        atualizarBotao(card, dados.id);
        atualizarContadores();
        return;
      }

      if (tipo === "CLIENTES") {
        document.getElementById("contador-clientes").textContent =
          `👥 ${dados.total} conectado${dados.total !== 1 ? "s" : ""}`;
        return;
      }
    };
  }


  function enviarPedido() {
    const cliente = document.getElementById("input-cliente").value.trim();
    const itens   = document.getElementById("input-itens").value.trim();
    if (!cliente || !itens) { mostrarToast("Preencha cliente e itens!"); return; }
    if (ws.readyState !== WebSocket.OPEN) { mostrarToast("Sem conexão com o servidor"); return; }

    ws.send(JSON.stringify({ tipo: "NOVO_PEDIDO", dados: { cliente, itens } }));
    document.getElementById("input-cliente").value = "";
    document.getElementById("input-itens").value = "";
  }


  function avancarStatus(id) {
    if (ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ tipo: "ATUALIZAR_STATUS", dados: { id } }));
  }


  function renderPedido(pedido) {
    pedidos[pedido.id] = pedido;
    const coluna = document.getElementById(`col-${pedido.status}`);
    if (!coluna) return;

    const card = document.createElement("div");
    card.className = "pedido-card";
    card.id = `pedido-${pedido.id}`;
    card.innerHTML = `
      <div class="pedido-top">
        <span class="pedido-id">#${String(pedido.id).padStart(3, "0")}</span>
        <span class="pedido-hora">${pedido.hora}</span>
      </div>
      <div class="pedido-cliente">${escapeHtml(pedido.cliente)}</div>
      <div class="pedido-itens">${escapeHtml(pedido.itens)}</div>
      <button class="btn-avancar" onclick="avancarStatus(${pedido.id})">Avançar status →</button>
    `;
    coluna.appendChild(card);
    atualizarBotao(card, pedido.id);
  }

  function atualizarBotao(card, id) {
    const pedido = pedidos[id];
    const btn = card.querySelector(".btn-avancar");
    if (pedido.status === "Entregue") {
      btn.disabled = true;
      btn.textContent = "✓ Entregue";
    } else {
      const prox = STATUS[STATUS.indexOf(pedido.status) + 1];
      btn.textContent = `→ ${prox}`;
    }
  }

  function atualizarContadores() {
    const total = Object.keys(pedidos).length;
    document.getElementById("total-pedidos").textContent =
      `${total} pedido${total !== 1 ? "s" : ""}`;

    STATUS.forEach(s => {
      const cnt = Object.values(pedidos).filter(p => p.status === s).length;
      const el = document.getElementById(`cnt-${s}`);
      if (el) el.textContent = cnt;
    });
  }


  function setStatus(online) {
    const dot   = document.getElementById("status-dot");
    const texto = document.getElementById("status-texto");
    dot.className   = online ? "conectado" : "";
    texto.textContent = online ? "Conectado" : "Desconectado";
  }

  function addLog(msg, hora) {
    const box   = document.getElementById("log-box");
    const agora = hora || new Date().toLocaleTimeString("pt-BR");
    const span  = document.createElement("span");
    span.className = "log-entry";
    span.innerHTML = `<span class="log-hora">${agora}</span>${escapeHtml(msg)}`;
    box.appendChild(span);
    box.scrollTop = box.scrollHeight;
  }

  function mostrarToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Enter" && e.ctrlKey) enviarPedido();
  });

  conectar();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PedidoSocket</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f2f2f7;
      --surface:      #ffffff;
      --surface2:     #f9f9fb;
      --border:       rgba(0,0,0,0.08);
      --border2:      rgba(0,0,0,0.13);
      --ink:          #1c1c1e;
      --ink2:         #3a3a3c;
      --muted:        #8e8e93;
      --muted2:       #aeaeb2;
      --blue:         #007aff;
      --green:        #34c759;
      --orange:       #ff9500;
      --red:          #ff3b30;
      --indigo:       #5856d6;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 52px;
      background: rgba(242,242,247,0.9);
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--ink);
    }
    .logo-blue { color: var(--blue); }

    .header-right { display: flex; gap: 10px; align-items: center; }

    #status-ws {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
    }
    #status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.4s;
    }
    #status-dot.conectado {
      background: var(--green);
      animation: pulse-green 2.4s infinite;
    }
    @keyframes pulse-green {
      0%,100% { box-shadow: 0 0 0 0 rgba(52,199,89,0.45); }
      50%      { box-shadow: 0 0 0 4px rgba(52,199,89,0); }
    }

    #contador-clientes {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--ink2);
      background: var(--surface);
      border: 1px solid var(--border2);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── LAYOUT ── */
    .main-grid {
      display: grid;
      grid-template-columns: 272px 1fr;
      flex: 1;
      min-height: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    .section-label {
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 11px;
    }

    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .form-group label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--ink2);
    }
    .form-group input,
    .form-group textarea {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--ink);
      font-family: var(--font);
      font-size: 0.84rem;
      padding: 8px 11px;
      border-radius: var(--r-md);
      outline: none;
      resize: none;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--muted2); }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
      background: #fff;
    }

    .btn-enviar {
      width: 100%;
      background: var(--blue);
      color: #fff;
      border: none;
      font-family: var(--font);
      font-weight: 600;
      font-size: 0.84rem;
      padding: 10px;
      border-radius: var(--r-md);
      cursor: pointer;
      margin-top: 4px;
      transition: filter 0.14s, transform 0.1s;
    }
    .btn-enviar:hover  { filter: brightness(1.1); }
    .btn-enviar:active { transform: scale(0.975); filter: brightness(0.93); }

    /* log */
    #log-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 8px 11px;
      height: 118px;
      overflow-y: auto;
      font-family: "SF Mono", ui-monospace, "Cascadia Mono", monospace;
      font-size: 0.61rem;
      line-height: 1.9;
      color: var(--muted);
      scrollbar-width: thin;
      scrollbar-color: var(--muted2) transparent;
    }
    #log-box .log-entry { display: block; }
    #log-box .log-hora  { color: var(--blue); margin-right: 6px; font-weight: 500; }

    /* ── PAINEL ── */
    .painel { padding: 22px 24px; overflow-y: auto; }

    .painel-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .painel-titulo {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.4px;
    }
    #total-pedidos {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
    }

    /* ── KANBAN ── */
    .colunas {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      align-items: start;
    }

    .coluna-status {
      background: var(--surface);
      border-radius: var(--r-xl);
      padding: 13px 12px 15px;
      min-height: 150px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .coluna-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 11px;
    }
    .coluna-label {
      font-size: 0.71rem;
      font-weight: 600;
    }
    .coluna-count {
      font-size: 0.67rem;
      font-weight: 600;
      min-width: 20px; height: 20px;
      padding: 0 5px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .col-recebido .coluna-label { color: var(--indigo); }
    .col-recebido .coluna-count { background: rgba(88,86,214,0.1); color: var(--indigo); }

    .col-preparo  .coluna-label { color: var(--orange); }
    .col-preparo  .coluna-count { background: rgba(255,149,0,0.1); color: var(--orange); }

    .col-pronto   .coluna-label { color: var(--green); }
    .col-pronto   .coluna-count { background: rgba(52,199,89,0.1); color: var(--green); }

    .col-entregue .coluna-label { color: var(--muted); }
    .col-entregue .coluna-count { background: rgba(142,142,147,0.1); color: var(--muted); }

    /* ── CARD ── */
    .pedido-card {
      background: var(--bg);
      border-radius: var(--r-lg);
      padding: 10px 11px 9px;
      margin-bottom: 7px;
      animation: slideIn 0.2s ease;
      transition: box-shadow 0.16s, transform 0.12s;
    }
    .pedido-card:hover {
      box-shadow: 0 4px 18px rgba(0,0,0,0.09);
      transform: translateY(-1px);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .pedido-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    .pedido-id {
      font-size: 0.61rem;
      font-weight: 600;
      color: var(--blue);
    }
    .pedido-hora {
      font-size: 0.59rem;
      font-weight: 500;
      color: var(--muted);
    }
    .pedido-cliente {
      font-weight: 600;
      font-size: 0.82rem;
      color: var(--ink);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pedido-itens {
      font-size: 0.71rem;
      color: var(--ink2);
      line-height: 1.45;
      margin-bottom: 9px;
    }

    .btn-avancar {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--ink2);
      font-family: var(--font);
      font-size: 0.69rem;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: var(--r-sm);
      cursor: pointer;
      width: 100%;
      transition: background 0.13s, color 0.13s, border-color 0.13s;
    }
    .btn-avancar:hover {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }
    .btn-avancar:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .btn-avancar:disabled:hover {
      background: var(--surface);
      border-color: var(--border2);
      color: var(--ink2);
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(28,28,30,0.86);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: #fff;
      padding: 9px 16px;
      border-radius: var(--r-lg);
      font-size: 0.77rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(6px) scale(0.97);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0) scale(1); }

    @media (max-width: 1100px) {
      .main-grid { grid-template-columns: 1fr; }
      .colunas   { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .colunas   { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">PedidoSocket</div>
  
</header>

<div class="main-grid">

  <aside class="sidebar">
    <div>
      <div class="section-label">Novo Pedido</div>
      <div class="form-group">
        <label>Nome do cliente</label>
        <input id="input-cliente" type="text" placeholder="Nome" />
      </div>
      <div class="form-group" style="margin-bottom: 14px">
        <label>Itens do pedido</label>
        <textarea id="input-itens" rows="3" placeholder="Ex: 1x X-Burguer"></textarea>
      </div>
      <button class="btn-enviar" onclick="enviarPedido()">Enviar Pedido</button>
    </div>

    <div>
      <div class="section-label">Log de Conexões</div>
      <div id="log-box"></div>
    </div>

    <div class="header-right">
    <div id="status-ws">
      <div id="status-dot"></div>
      <span id="status-texto">Desconectado</span>
    </div>
    <div id="contador-clientes">👥 0 conectados</div>
  </div>
  </aside>

  <main class="painel">
    <div class="painel-header">
      <div class="painel-titulo">Painel de Pedidos</div>
      <div id="total-pedidos">0 pedidos</div>
    </div>

    <div class="colunas">
      <div class="coluna-status col-recebido" id="col-Recebido">
        <div class="coluna-header">
          <span class="coluna-label">Recebido</span>
          <span class="coluna-count" id="cnt-Recebido">0</span>
        </div>
      </div>
      <div class="coluna-status col-preparo" id="col-Em preparo">
        <div class="coluna-header">
          <span class="coluna-label">Em Preparo</span>
          <span class="coluna-count" id="cnt-Em preparo">0</span>
        </div>
      </div>
      <div class="coluna-status col-pronto" id="col-Pronto">
        <div class="coluna-header">
          <span class="coluna-label">Pronto</span>
          <span class="coluna-count" id="cnt-Pronto">0</span>
        </div>
      </div>
      <div class="coluna-status col-entregue" id="col-Entregue">
        <div class="coluna-header">
          <span class="coluna-label">Entregue</span>
          <span class="coluna-count" id="cnt-Entregue">0</span>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
  const STATUS = ["Recebido", "Em preparo", "Pronto", "Entregue"];
  let pedidos = {};
  let ws;

  function conectar() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}`);

    ws.onopen = () => {
      setStatus(true);
      addLog("Conexão WebSocket estabelecida");
    };

    ws.onclose = () => {
      setStatus(false);
      addLog("Conexão encerrada — tentando reconectar...");
      setTimeout(conectar, 3000);
    };

    ws.onerror = () => {
      addLog("Erro na conexão WebSocket");
    };

    ws.onmessage = (event) => {
      const { tipo, dados } = JSON.parse(event.data);

      if (tipo === "ESTADO_INICIAL") {
        dados.pedidos.forEach(renderPedido);
        dados.logs.forEach(e => addLog(`${e.msg}`, e.hora));
        atualizarContadores();
        return;
      }

      if (tipo === "PEDIDO_CRIADO") {
        renderPedido(dados);
        atualizarContadores();
        mostrarToast(`Novo pedido: ${dados.cliente}`);
        return;
      }

      if (tipo === "STATUS_ATUALIZADO") {
        const card = document.getElementById(`pedido-${dados.id}`);
        if (!card) return;
        const pedido = pedidos[dados.id];
        if (!pedido) return;
        const colAtual = document.getElementById(`col-${pedido.status}`);
        if (colAtual) colAtual.removeChild(card);
        pedido.status = dados.status;
        const colNova = document.getElementById(`col-${dados.status}`);
        if (colNova) colNova.appendChild(card);
        atualizarBotao(card, dados.id);
        atualizarContadores();
        return;
      }

      if (tipo === "CLIENTES") {
        document.getElementById("contador-clientes").textContent =
          `👥 ${dados.total} conectado${dados.total !== 1 ? "s" : ""}`;
        return;
      }
    };
  }

  function enviarPedido() {
    const cliente = document.getElementById("input-cliente").value.trim();
    const itens   = document.getElementById("input-itens").value.trim();
    if (!cliente || !itens) { mostrarToast("Preencha cliente e itens!"); return; }
    if (ws.readyState !== WebSocket.OPEN) { mostrarToast("Sem conexão com o servidor"); return; }

    ws.send(JSON.stringify({ tipo: "NOVO_PEDIDO", dados: { cliente, itens } }));
    document.getElementById("input-cliente").value = "";
    document.getElementById("input-itens").value = "";
  }

  function avancarStatus(id) {
    if (ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ tipo: "ATUALIZAR_STATUS", dados: { id } }));
  }

  function renderPedido(pedido) {
    pedidos[pedido.id] = pedido;
    const coluna = document.getElementById(`col-${pedido.status}`);
    if (!coluna) return;

    const card = document.createElement("div");
    card.className = "pedido-card";
    card.id = `pedido-${pedido.id}`;
    card.innerHTML = `
      <div class="pedido-top">
        <span class="pedido-id">#${String(pedido.id).padStart(3, "0")}</span>
        <span class="pedido-hora">${pedido.hora}</span>
      </div>
      <div class="pedido-cliente">${escapeHtml(pedido.cliente)}</div>
      <div class="pedido-itens">${escapeHtml(pedido.itens)}</div>
      <button class="btn-avancar" onclick="avancarStatus(${pedido.id})">Avançar status</button>
    `;
    coluna.appendChild(card);
    atualizarBotao(card, pedido.id);
  }

  function atualizarBotao(card, id) {
    const pedido = pedidos[id];
    const btn = card.querySelector(".btn-avancar");
    if (pedido.status === "Entregue") {
      btn.disabled = true;
      btn.textContent = "✓ Entregue";
    } else {
      const prox = STATUS[STATUS.indexOf(pedido.status) + 1];
      btn.textContent = `→ ${prox}`;
    }
  }

  function atualizarContadores() {
    const total = Object.keys(pedidos).length;
    document.getElementById("total-pedidos").textContent =
      `${total} pedido${total !== 1 ? "s" : ""}`;

    STATUS.forEach(s => {
      const cnt = Object.values(pedidos).filter(p => p.status === s).length;
      const el = document.getElementById(`cnt-${s}`);
      if (el) el.textContent = cnt;
    });
  }

  function setStatus(online) {
    const dot   = document.getElementById("status-dot");
    const texto = document.getElementById("status-texto");
    dot.className    = online ? "conectado" : "";
    texto.textContent = online ? "Conectado" : "Desconectado";
  }

  function addLog(msg, hora) {
    const box   = document.getElementById("log-box");
    const agora = hora || new Date().toLocaleTimeString("pt-BR");
    const span  = document.createElement("span");
    span.className = "log-entry";
    span.innerHTML = `<span class="log-hora">${agora}</span>${escapeHtml(msg)}`;
    box.appendChild(span);
    box.scrollTop = box.scrollHeight;
  }

  function mostrarToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Enter" && e.ctrlKey) enviarPedido();
  });

  conectar();
</script>
</body>
</html>
